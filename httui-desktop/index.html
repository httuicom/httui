<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts are self-hosted (offline-safe): see src/fonts.css + public/fonts/. -->
    <title>httui</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var pref = stored === "light" || stored === "dark"
            ? stored
            : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.classList.add(pref);
          document.documentElement.style.colorScheme = pref;
          document.documentElement.style.backgroundColor = pref === "dark" ? "#0a0a0a" : "#ffffff";
        } catch (e) {
          document.documentElement.classList.add("light");
        }
      })();
    </script>
    <style>
      html { background-color: #ffffff; }
      html.dark { background-color: #0a0a0a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
