name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "httui-web/**"
      - "httui-desktop/src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (workspace root)
        run: npm ci

      - name: Build httui-web
        run: npm run build --workspace httui-web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: httui-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
