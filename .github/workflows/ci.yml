name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri's webkit2gtk binding is required even for `cargo check`
      # of the httui-notes (Tauri) crate.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: ${{ !cancelled() }}
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        if: ${{ !cancelled() }}
        run: cargo test --workspace

      - name: cargo check (all targets)
        if: ${{ !cancelled() }}
        run: cargo check --workspace --all-targets

  rust-macos-smoke:
    name: Rust (macOS smoke)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-smoke

      # Excludes httui-notes (Tauri) — we'd need the full bundling
      # toolchain to build that. Smoke covers the platform-sensitive
      # crates: keyring (httui-core), TUI bindings (httui-tui),
      # MCP server (httui-mcp).
      - name: cargo check (excluding Tauri crate)
        run: cargo check --workspace --exclude httui-notes

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: prettier --check
        run: ./node_modules/.bin/prettier --check 'httui-desktop/src/**/*.{ts,tsx,js,jsx,css,md}' 'httui-web/src/**/*.{ts,tsx,js,jsx,css,md}' 'httui-sidecar/src/**/*.{ts,tsx,js,jsx}'

      - name: tsc --noEmit (httui-desktop)
        if: ${{ !cancelled() }}
        run: ./node_modules/.bin/tsc --noEmit -p httui-desktop/tsconfig.json

      - name: eslint (httui-desktop)
        if: ${{ !cancelled() }}
        run: npm run lint --workspace httui-desktop

      - name: eslint (httui-web)
        if: ${{ !cancelled() }}
        run: npm run lint --workspace httui-web

      # Runs the `unit` project only (jsdom). The `browser` project uses
      # @vitest/browser-playwright and would require installing chromium
      # in CI; skip until browser-test coverage is needed in the gate.
      - name: vitest (httui-desktop, unit)
        if: ${{ !cancelled() }}
        run: npm run test --workspace httui-desktop -- --project unit

      - name: Build httui-web (smoke)
        if: ${{ !cancelled() }}
        run: npm run build --workspace httui-web

      - name: Build httui-sidecar (smoke)
        if: ${{ !cancelled() }}
        run: npm run build --workspace httui-sidecar

  coverage-gate:
    name: Coverage gate (touched files ≥80%)
    runs-on: ubuntu-latest
    needs: [rust, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the script can diff against the base ref.
          fetch-depth: 0

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Resolve base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=origin/${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Size gate (≤600 lines per touched file)
        env:
          BASE_REF: ${{ steps.base.outputs.ref }}
        run: ./scripts/size-check.sh

      - name: Coverage gate
        if: ${{ !cancelled() }}
        env:
          BASE_REF: ${{ steps.base.outputs.ref }}
        run: ./scripts/coverage-check.sh
