name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Classifies the diff so language-specific jobs can skip entirely on
  # commits that don't touch them (a TUI-only push shouldn't pay the
  # full vitest suite, and vice versa). Classification is conservative:
  # any file that isn't clearly rust-only, frontend-only, or inert
  # (docs, markdown) turns BOTH areas on. Skipped jobs satisfy required
  # status checks, so branch protection keeps working.
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="origin/${{ github.base_ref }}...HEAD"
          elif git rev-parse -q --verify "${{ github.event.before }}" >/dev/null 2>&1; then
            RANGE="${{ github.event.before }}..HEAD"
          else
            # Force push or new branch — no usable base; run everything.
            echo "rust=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rust=false
          frontend=false
          while IFS= read -r f; do
            case "$f" in
              *.md | docs/* | docs-llm/* | LICENSE | .gitignore | httui-web/*)
                ;;
              *.rs | *Cargo.toml | Cargo.lock | httui-desktop/src-tauri/* | rust-toolchain*)
                rust=true ;;
              httui-desktop/src/* | httui-desktop/index.html | httui-desktop/package.json | \
              httui-desktop/*.ts | httui-desktop/*.json | httui-sidecar/* | package.json | package-lock.json)
                frontend=true ;;
              *)
                # Unknown territory (workflows, scripts, Makefile...) —
                # assume it can affect anything.
                rust=true
                frontend=true ;;
            esac
          done < <(git diff --name-only "$RANGE")

          echo "changed areas: rust=$rust frontend=$frontend"
          echo "rust=$rust" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

  rust:
    name: Rust (Linux)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7

      # Tauri's webkit2gtk binding is required even for `cargo check`
      # of the httui-notes (Tauri) crate.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # tauri.conf.json → bundle.externalBin lists httui-tui, the
      # httui launcher and the httui-lsp language server. tauri-build's
      # resource validator checks the files exist before letting
      # `cargo check/test` proceed. CI doesn't bundle, so 0-byte
      # placeholders satisfy the gate without the cost of a full
      # release compile (or release download) of those binaries.
      - name: Stage bundle binary placeholders
        run: |
          triple=$(rustc -vV | sed -n 's|host: ||p')
          mkdir -p httui-desktop/src-tauri/binaries
          touch "httui-desktop/src-tauri/binaries/httui-tui-$triple" \
                "httui-desktop/src-tauri/binaries/httui-$triple" \
                "httui-desktop/src-tauri/binaries/httui-lsp-$triple"

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: ${{ !cancelled() }}
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        if: ${{ !cancelled() }}
        # tauri-build copies the staged sidecar placeholder over
        # target/debug/httui — the launcher's own output. With a warm
        # cache the launcher is not relinked afterwards, so its
        # integration tests would spawn the 0-byte placeholder
        # (EACCES). Relink it after the workspace build so the tests
        # spawn the real binary.
        run: |
          cargo build --workspace --all-targets
          touch httui-launcher/src/main.rs
          cargo build -p httui-launcher
          cargo test --workspace

      - name: cargo check (all targets)
        if: ${{ !cancelled() }}
        run: cargo check --workspace --all-targets

  rust-macos-smoke:
    name: Rust (macOS smoke)
    runs-on: macos-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-smoke

      # Excludes httui-notes (Tauri) — we'd need the full bundling
      # toolchain to build that. Smoke covers the platform-sensitive
      # crates: keyring (httui-core), TUI bindings (httui-tui),
      # MCP server (httui-mcp).
      - name: cargo check (excluding Tauri crate)
        run: cargo check --workspace --exclude httui-notes

  frontend:
    name: Frontend
    # arm64 runners are free for public repos and meaningfully faster
    # than the x64 ubuntu-latest pool — this job is vitest-bound.
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          # vitest --changed needs history to diff against the PR base.
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: prettier --check
        run: ./node_modules/.bin/prettier --check 'httui-desktop/src/**/*.{ts,tsx,js,jsx,css,md}' 'httui-sidecar/src/**/*.{ts,tsx,js,jsx}'

      - name: tsc --noEmit (httui-desktop)
        if: ${{ !cancelled() }}
        run: ./node_modules/.bin/tsc --noEmit -p httui-desktop/tsconfig.json

      - name: eslint (httui-desktop)
        if: ${{ !cancelled() }}
        run: npm run lint --workspace httui-desktop

      # Runs the `unit` project only (jsdom). The `browser` project uses
      # @vitest/browser-playwright and would require installing chromium
      # in CI; skip until browser-test coverage is needed in the gate.
      # PRs run only the tests whose import graph reaches the diff
      # (--changed); pushes to main run the full suite as the backstop
      # for anything the graph scoping might miss.
      - name: vitest (httui-desktop, unit)
        if: ${{ !cancelled() }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run test --workspace httui-desktop -- --project unit \
              --changed "origin/${{ github.base_ref }}" --passWithNoTests
          else
            npm run test --workspace httui-desktop -- --project unit
          fi

      - name: Build httui-sidecar (smoke)
        if: ${{ !cancelled() }}
        run: npm run build --workspace httui-sidecar

  coverage-gate:
    name: Coverage gate (touched files ≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Need full history so the script can diff against the base ref.
          fetch-depth: 0

      - name: Resolve base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=origin/${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"
          fi

      # Setup below (apt webkit deps, Rust toolchain, npm ci) costs
      # ~90s but is only needed for the languages the diff actually
      # touches — skip what the gate won't use.
      - name: Detect touched code
        id: detect
        env:
          BASE_REF: ${{ steps.base.outputs.ref }}
        run: |
          MODE=detect ./scripts/coverage-check.sh | tee detect.out
          grep -E '^(has_rs|has_fe|needs_webkit)=' detect.out >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        if: steps.detect.outputs.needs_webkit == '1'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        if: steps.detect.outputs.has_rs == '1'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        if: steps.detect.outputs.has_rs == '1'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage

      - name: Install cargo-llvm-cov
        if: steps.detect.outputs.has_rs == '1'
        uses: taiki-e/install-action@cargo-llvm-cov

      # Same reason as the rust job — bundle.externalBin gate.
      - name: Stage bundle binary placeholders
        if: steps.detect.outputs.has_rs == '1'
        run: |
          triple=$(rustc -vV | sed -n 's|host: ||p')
          mkdir -p httui-desktop/src-tauri/binaries
          touch "httui-desktop/src-tauri/binaries/httui-tui-$triple" \
                "httui-desktop/src-tauri/binaries/httui-$triple" \
                "httui-desktop/src-tauri/binaries/httui-lsp-$triple"

      - uses: actions/setup-node@v6
        if: steps.detect.outputs.has_fe == '1'
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        if: steps.detect.outputs.has_fe == '1'
        run: npm ci

      - name: Size gate (≤600 lines per touched file)
        env:
          BASE_REF: ${{ steps.base.outputs.ref }}
        run: ./scripts/size-check.sh

      - name: Coverage gate
        if: ${{ !cancelled() }}
        env:
          BASE_REF: ${{ steps.base.outputs.ref }}
        run: ./scripts/coverage-check.sh
