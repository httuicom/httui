name: Security audit

on:
  schedule:
    # Mondays at 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: audit
  cancel-in-progress: false

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Opens a tracking issue automatically when advisories are found.
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Open issue on findings
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const audit = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
            const vulns = audit.metadata?.vulnerabilities ?? {};
            const total = (vulns.high ?? 0) + (vulns.critical ?? 0);
            if (total === 0) {
              core.info('npm audit exit code non-zero but no high/critical findings; skipping issue.');
              return;
            }

            const body = [
              `Weekly \`npm audit\` found **${total}** high/critical vulnerabilities.`,
              '',
              '```json',
              JSON.stringify(vulns, null, 2),
              '```',
              '',
              'Run `npm audit` locally to see the full advisory list and consider `npm audit fix` (review the diff before committing).',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const title = `npm audit: ${total} high/critical vulnerabilities (${new Date().toISOString().slice(0, 10)})`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,npm-audit',
              per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
              core.info(`Updated existing issue #${existing.data[0].number}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'npm-audit'],
            });
