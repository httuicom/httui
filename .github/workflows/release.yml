name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Gate ────────────────────────────────────────────────────────
  # V12 cenário 8: release notes are CURATED in CHANGELOG.md, not
  # auto-derived. This job fails the whole release if the tag has no
  # corresponding `## [VERSION]` section (or, for a pre-release tag,
  # no section for its base version). Nothing builds without notes.
  validate:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.v.outputs.version }}
      prerelease: ${{ steps.v.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + assert CHANGELOG entry
        id: v
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Pre-release detection (V12 cenário 9). Accept both the
          # semver-canonical `-rc.N` and the bare `-rcN` form so the
          # tag conventions in docs/RELEASE.md stay flexible.
          if [[ "$VERSION" =~ -(rc|beta|alpha)\.?[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md is missing."
            exit 1
          fi

          # Exact section, else fall back to the base version for a
          # pre-release (e.g. `1.0.0-rc.1` → `## [1.0.0]`).
          BASE="${VERSION%%-*}"
          if grep -qE "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "Found CHANGELOG section: ## [${VERSION}]"
          elif grep -qE "^## \[${BASE}\]" CHANGELOG.md; then
            echo "Found CHANGELOG section: ## [${BASE}] (base for pre-release)"
          else
            echo "::error::No CHANGELOG.md section for [${VERSION}] or [${BASE}]. Add a curated entry before tagging — see docs/RELEASE.md."
            exit 1
          fi

  # ── Build + publish ─────────────────────────────────────────────
  release:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app,dmg
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin --bundles app,dmg
            target: x86_64-apple-darwin
          # Linux: deb + rpm + AppImage (V12 cenário 4).
          - platform: ubuntu-22.04
            args: --bundles appimage,deb,rpm
            target: ""
          # Windows: MSI + NSIS .exe (V12 cenário 3). Code-signing
          # cert is out of scope for v1 (decision 2026-05-17) — the
          # installers ship unsigned and SmartScreen warns on first
          # run, which is acceptable for a developer build.
          - platform: windows-latest
            args: --bundles msi,nsis
            target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" httui-desktop/src-tauri/tauri.conf.json && rm httui-desktop/src-tauri/tauri.conf.json.bak
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" httui-desktop/package.json && rm httui-desktop/package.json.bak
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" httui-desktop/src-tauri/Cargo.toml && rm httui-desktop/src-tauri/Cargo.toml.bak

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="${VERSION%%-*}"
          NOTES_FILE="$(mktemp)"
          # validate already proved one of these sections exists.
          SECTION="$VERSION"
          grep -qE "^## \[${VERSION}\]" CHANGELOG.md || SECTION="$BASE"
          awk -v v="${SECTION}" '
            $0 ~ "^## \\[" v "\\]" { found = 1; next }
            found && /^## \[/        { exit }
            found                    { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build sidecar
        run: |
          cd httui-sidecar && bun install && bun run build

      - name: Read release body
        id: body
        shell: bash
        run: |
          {
            echo 'body<<HTTUI_NOTES_EOF'
            cat "${{ steps.notes.outputs.path }}"
            echo HTTUI_NOTES_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign). Without this secret tauri-action
          # builds without updater artifacts and in-app auto-update is
          # inert — the rest of the release still ships.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # macOS Developer ID codesign + notarization (V12 cenário 2).
          # SCAFFOLD ONLY for v1: these secrets are unset, so
          # tauri-action skips signing and ships an unsigned dev build
          # (Gatekeeper bypass documented in docs/RELEASE.md). Set the
          # secrets and the same workflow notarizes with no edits.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: httui-desktop
          tagName: ${{ github.ref_name }}
          releaseName: "httui notes ${{ github.ref_name }}"
          releaseBody: ${{ steps.body.outputs.body }}
          releaseDraft: false
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          args: ${{ matrix.args }}

  # ── Homebrew cask (V12 cenário 5) ───────────────────────────────
  # Bumps the cask in the tap repo (httuicom/homebrew-httui) so
  # `brew tap httuicom/httui && brew install --cask httui` works.
  # Stable releases only. Gated on HOMEBREW_TAP_TOKEN (a PAT with
  # write access to the tap) — without it the step is skipped so the
  # release still succeeds for contributors. Prerequisite: the tap
  # repo must exist (see docs/RELEASE.md). Not exercisable in CI
  # until both exist — CI-bound.
  homebrew:
    needs: [validate, release]
    if: needs.validate.outputs.prerelease == 'false'
    runs-on: ubuntu-22.04
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Bump Homebrew cask
        if: ${{ env.TAP_TOKEN != '' }}
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          REPO="httuicom/httui"
          TAP="httuicom/homebrew-httui"
          BASE="https://github.com/${REPO}/releases/download/v${VERSION}"
          ARM_DMG="httui_${VERSION}_aarch64.dmg"
          X64_DMG="httui_${VERSION}_x64.dmg"

          tmp="$(mktemp -d)"
          curl -fsSL "${BASE}/${ARM_DMG}" -o "$tmp/arm.dmg"
          curl -fsSL "${BASE}/${X64_DMG}" -o "$tmp/x64.dmg"
          ARM_SHA="$(sha256sum "$tmp/arm.dmg" | cut -d' ' -f1)"
          X64_SHA="$(sha256sum "$tmp/x64.dmg" | cut -d' ' -f1)"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP}.git" "$tmp/tap"
          mkdir -p "$tmp/tap/Casks"
          cat > "$tmp/tap/Casks/httui.rb" <<RUBY
          cask "httui" do
            version "${VERSION}"

            on_arm do
              sha256 "${ARM_SHA}"
              url "${BASE}/${ARM_DMG}"
            end
            on_intel do
              sha256 "${X64_SHA}"
              url "${BASE}/${X64_DMG}"
            end

            name "httui notes"
            desc "Desktop markdown editor with executable HTTP/DB blocks"
            homepage "https://github.com/${REPO}"

            app "httui.app"
          end
          RUBY

          cd "$tmp/tap"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/httui.rb
          git commit -m "httui ${VERSION}"
          git push

      - name: Skipped (no tap token)
        if: ${{ env.TAP_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_TOKEN not set — skipping Homebrew bump."

  # ── winget manifest (V12 cenário 6) ─────────────────────────────
  # Opens a PR against microsoft/winget-pkgs with the new MSI.
  # Stable releases only. Gated on WINGET_TOKEN (a classic PAT that
  # can fork winget-pkgs). CI-bound: needs the token and a merged
  # first manifest before `winget install httui` resolves.
  winget:
    needs: [validate, release]
    if: needs.validate.outputs.prerelease == 'false'
    runs-on: ubuntu-22.04
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - name: Submit winget manifest
        if: ${{ env.WINGET_TOKEN != '' }}
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: httui.notes
          version: ${{ needs.validate.outputs.version }}
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}

      - name: Skipped (no winget token)
        if: ${{ env.WINGET_TOKEN == '' }}
        run: echo "WINGET_TOKEN not set — skipping winget submission."
