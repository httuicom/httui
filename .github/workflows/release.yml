name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Gate ────────────────────────────────────────────────────────
  # release notes are CURATED in CHANGELOG.md, not
  # auto-derived. This job fails the whole release if the tag has no
  # corresponding `## [VERSION]` section (or, for a pre-release tag,
  # no section for its base version). Nothing builds without notes.
  validate:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.v.outputs.version }}
      prerelease: ${{ steps.v.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version + assert CHANGELOG entry
        id: v
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Pre-release detection. Accept both the
          # semver-canonical `-rc.N` and the bare `-rcN` form so the
          # tag conventions in https://httui.com/docs/releases stay flexible.
          if [[ "$VERSION" =~ -(rc|beta|alpha)\.?[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md is missing."
            exit 1
          fi

          # Exact section, else fall back to the base version for a
          # pre-release (e.g. `1.0.0-rc.1` → `## [1.0.0]`).
          BASE="${VERSION%%-*}"
          if grep -qE "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "Found CHANGELOG section: ## [${VERSION}]"
          elif grep -qE "^## \[${BASE}\]" CHANGELOG.md; then
            echo "Found CHANGELOG section: ## [${BASE}] (base for pre-release)"
          else
            echo "::error::No CHANGELOG.md section for [${VERSION}] or [${BASE}]. Add a curated entry before tagging — see https://httui.com/docs/releases."
            exit 1
          fi

  # ── Build + publish ─────────────────────────────────────────────
  release:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app,dmg
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin --bundles app,dmg
            target: x86_64-apple-darwin
          # Linux: deb + rpm + AppImage.
          - platform: ubuntu-22.04
            args: --bundles appimage,deb,rpm
            target: ""
          # Windows: MSI + NSIS .exe. Code-signing
          # cert is out of scope for v1 (decision 2026-05-17) — the
          # installers ship unsigned and SmartScreen warns on first
          # run, which is acceptable for a developer build.
          - platform: windows-latest
            args: --bundles msi,nsis
            target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Dependency compilation dominates the release build (~20 min on
      # Windows from a cold target dir). Cache entries are immutable
      # and the two macOS targets build on the same arm64 host, so the
      # key must include the target or whichever job saves first leaves
      # the other target permanently cold.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Falls back to the bare 'release' key when the matrix entry
          # passes no explicit target (Linux/Windows) so the caches
          # already saved under that key stay warm.
          shared-key: ${{ matrix.target && format('release-{0}', matrix.target) || 'release' }}
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # The WiX/MSI target rejects non-numeric pre-release
          # identifiers ("rc.1") in ProductVersion. Strip the
          # pre-release suffix for the bundled binary version so all
          # targets build; the GitHub release/tag keep the full
          # ${{ github.ref_name }} and `validate` reads the raw ref,
          # so prerelease detection is unaffected.
          BUNDLE_VERSION="${VERSION%%-*}"
          echo "Tag version: $VERSION — bundle version: $BUNDLE_VERSION"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$BUNDLE_VERSION\"/" httui-desktop/src-tauri/tauri.conf.json && rm httui-desktop/src-tauri/tauri.conf.json.bak
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$BUNDLE_VERSION\"/" httui-desktop/package.json && rm httui-desktop/package.json.bak
          sed -i.bak "s/^version = \".*\"/version = \"$BUNDLE_VERSION\"/" httui-desktop/src-tauri/Cargo.toml && rm httui-desktop/src-tauri/Cargo.toml.bak

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="${VERSION%%-*}"
          NOTES_FILE="$(mktemp)"
          # validate already proved one of these sections exists.
          SECTION="$VERSION"
          grep -qE "^## \[${VERSION}\]" CHANGELOG.md || SECTION="$BASE"
          awk -v v="${SECTION}" '
            $0 ~ "^## \\[" v "\\]" { found = 1; next }
            found && /^## \[/        { exit }
            found                    { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build sidecar
        run: |
          cd httui-sidecar && bun install && bun run build

      - name: Stage TUI + launcher + language server binaries for the bundle
        shell: bash
        run: |
          # tauri.conf.json → bundle.externalBin expects pre-built
          # files at httui-desktop/src-tauri/binaries/<name>-<triple>.
          # Matrix entries with an explicit --target pass it through;
          # entries without one (Linux/Windows today) detect the host
          # triple inside the script.
          scripts/prepare-bundle-bins.sh "${{ matrix.target }}"

      - name: Read release body
        id: body
        shell: bash
        run: |
          {
            echo 'body<<HTTUI_NOTES_EOF'
            cat "${{ steps.notes.outputs.path }}"
            echo HTTUI_NOTES_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign). Without this secret tauri-action
          # builds without updater artifacts and in-app auto-update is
          # inert — the rest of the release still ships.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # macOS Developer ID codesign + notarization — DELIBERATELY
          # NOT WIRED for v1. The APPLE_* env is intentionally absent so
          # no org/repo secret or variable can reach the build via a
          # `${{ }}` expression: tauri-action does ad-hoc signing and
          # ships an unsigned dev build (Homebrew cask strips quarantine
          # + the documented Gatekeeper bypass cover it, see
          # https://httui.com/docs/releases §5). A broken/lingering org-level
          # APPLE_CERTIFICATE secret previously failed every macOS job
          # at `security import` precisely because it was referenced
          # here. To enable real signing once a Developer ID exists:
          # re-add the six APPLE_* env entries (deliberate edit).
        with:
          projectPath: httui-desktop
          tagName: ${{ github.ref_name }}
          releaseName: "httui notes ${{ github.ref_name }}"
          releaseBody: ${{ steps.body.outputs.body }}
          releaseDraft: false
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          args: ${{ matrix.args }}

  # ── Homebrew cask ───────────────────────────────
  # Bumps the cask in the tap repo (httuicom/homebrew-httui) so
  # `brew tap httuicom/httui && brew install --cask httui` works.
  # Stable releases only. Gated on HOMEBREW_TAP_TOKEN (a PAT with
  # write access to the tap) — without it the step is skipped so the
  # release still succeeds for contributors. Prerequisite: the tap
  # repo must exist (see https://httui.com/docs/releases). Not exercisable in CI
  # until both exist — CI-bound.
  homebrew:
    needs: [validate, release]
    if: needs.validate.outputs.prerelease == 'false'
    runs-on: ubuntu-22.04
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Bump Homebrew cask
        if: ${{ env.TAP_TOKEN != '' }}
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          REPO="httuicom/httui"
          TAP="httuicom/homebrew-httui"
          BASE="https://github.com/${REPO}/releases/download/v${VERSION}"
          ARM_DMG="httui_${VERSION}_aarch64.dmg"
          X64_DMG="httui_${VERSION}_x64.dmg"

          tmp="$(mktemp -d)"
          curl -fsSL "${BASE}/${ARM_DMG}" -o "$tmp/arm.dmg"
          curl -fsSL "${BASE}/${X64_DMG}" -o "$tmp/x64.dmg"
          ARM_SHA="$(sha256sum "$tmp/arm.dmg" | cut -d' ' -f1)"
          X64_SHA="$(sha256sum "$tmp/x64.dmg" | cut -d' ' -f1)"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP}.git" "$tmp/tap"
          mkdir -p "$tmp/tap/Casks"
          cat > "$tmp/tap/Casks/httui.rb" <<RUBY
          cask "httui" do
            arch arm: "aarch64", intel: "x64"

            version "${VERSION}"
            sha256 arm:   "${ARM_SHA}",
                   intel: "${X64_SHA}"

            url "${BASE}/httui_#{version}_#{arch}.dmg"
            name "httui notes"
            desc "Desktop markdown editor with executable HTTP/DB blocks"
            homepage "https://github.com/${REPO}"

            auto_updates true

            app "httui.app"
            binary "#{appdir}/httui.app/Contents/MacOS/httui", target: "httui"
          end
          RUBY

          cd "$tmp/tap"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/httui.rb
          git commit -m "httui ${VERSION}"
          git push

      - name: Skipped (no tap token)
        if: ${{ env.TAP_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_TOKEN not set — skipping Homebrew bump."

  # ── winget manifest ─────────────────────────────
  # Opens a PR against microsoft/winget-pkgs with the new MSI.
  # Stable releases only. Gated on WINGET_TOKEN (a classic PAT that
  # can fork winget-pkgs). CI-bound: needs the token and a merged
  # first manifest before `winget install httui` resolves.
  winget:
    needs: [validate, release]
    if: needs.validate.outputs.prerelease == 'false'
    runs-on: ubuntu-22.04
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - name: Submit winget manifest
        if: ${{ env.WINGET_TOKEN != '' }}
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: httui.notes
          version: ${{ needs.validate.outputs.version }}
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}

      - name: Skipped (no winget token)
        if: ${{ env.WINGET_TOKEN == '' }}
        run: echo "WINGET_TOKEN not set — skipping winget submission."
